<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日报填写监控与管理看板</title>
  <style>
    :root {
      --sidebar-width: 230px;
      --drawer-width: 382px;
      --bg: #f5f7fb;
      --sidebar: #1a1d29;
      --sidebar-2: #202435;
      --sidebar-border: rgba(148, 163, 184, 0.18);
      --primary: #4f6ef7;
      --primary-dark: #3655e7;
      --primary-soft: #eef3ff;
      --primary-soft-2: #f6f8ff;
      --text: #1e293b;
      --text-2: #334155;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --border: #e2e8f0;
      --border-soft: #eef2f7;
      --card: #ffffff;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --orange: #f97316;
      --purple: #8b5cf6;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 10px 28px rgba(15, 23, 42, 0.055);
      --shadow-lg: 0 18px 42px rgba(15, 23, 42, 0.14);
      --radius: 14px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Roboto, Arial, sans-serif;
      color: var(--text-2);
      background:
        radial-gradient(circle at 80% -10%, rgba(79, 110, 247, .10), transparent 30%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 35%, #f2f5fa 100%);
      overflow-x: hidden;
      letter-spacing: -0.01em;
    }

    button, input {
      font-family: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 80;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.96);
      border-radius: 12px;
      box-shadow: var(--shadow);
      cursor: pointer;
      color: var(--text);
      font-size: 22px;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: linear-gradient(180deg, #171b28 0%, var(--sidebar) 100%);
      color: #cbd5e1;
      z-index: 60;
      transition: transform .3s ease;
      box-shadow: 12px 0 28px rgba(15, 23, 42, .12);
    }

    .logo {
      height: 82px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--primary), #6f8bff);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(79, 110, 247, .25);
    }

    .logo-title {
      color: #fff;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .nav {
      margin-top: 24px;
      padding: 0 16px;
    }

    .nav a,
    .org-action {
      width: 100%;
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 11px;
      color: #cbd5e1;
      transition: all .18s ease;
      cursor: pointer;
      border: 0;
      background: transparent;
      text-align: left;
      font-size: 14px;
      font-weight: 650;
    }

    .nav a:hover,
    .org-action:hover {
      background: rgba(255,255,255,.065);
      color: #fff;
      transform: translateX(2px);
    }

    .nav a.active {
      background: rgba(79, 110, 247, .16);
      border-left: 4px solid var(--primary);
      color: #89a0ff;
      padding-left: 8px;
    }

    .nav-icon {
      width: 22px;
      text-align: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .org-action {
      margin-top: 8px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(148,163,184,.14);
    }

    .org-action.open {
      background: rgba(79, 110, 247, .16);
      color: #b7c5ff;
      border-color: rgba(79,110,247,.28);
    }

    .side-section {
      margin-top: 30px;
      padding: 0 16px;
    }

    .side-title {
      padding: 0 12px;
      color: #64748b;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .mini-dept-list {
      margin-top: 14px;
      display: grid;
      gap: 4px;
      max-height: calc(100vh - 430px);
      overflow-y: auto;
      scrollbar-width: none;
    }

    .mini-dept-list::-webkit-scrollbar {
      display: none;
    }

    .mini-dept {
      width: 100%;
      border: 0;
      background: transparent;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: .16s ease;
    }

    .mini-dept:hover,
    .mini-dept.active {
      background: rgba(255,255,255,.07);
    }

    .mini-dept.active {
      color: #fff;
    }

    .mini-dept span:first-child {
      font-size: 14px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rate-pill {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 850;
      line-height: 1.45;
      flex-shrink: 0;
    }

    .rate-good {
      color: #4ade80;
      background: rgba(34,197,94,.14);
    }

    .rate-mid {
      color: #facc15;
      background: rgba(245,158,11,.15);
    }

    .rate-bad {
      color: #f87171;
      background: rgba(239,68,68,.14);
    }

    .user-box {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 22px 24px;
      border-top: 1px solid var(--sidebar-border);
      background: linear-gradient(180deg, rgba(26,29,41,.88), var(--sidebar));
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), #6d86ff);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 850;
      flex-shrink: 0;
    }

    .user-main {
      min-width: 0;
      flex: 1;
    }

    .user-name {
      color: #fff;
      font-weight: 760;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-dept {
      color: #64748b;
      font-size: 12px;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout {
      color: #64748b;
      font-size: 18px;
    }

    .main {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      transition: margin .3s ease;
    }

    .top-header {
      position: sticky;
      top: 0;
      z-index: 40;
      min-height: 82px;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .welcome-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .welcome-muted {
      font-size: 18px;
      color: #94a3b8;
      font-weight: 500;
    }

    .welcome-name {
      font-size: 38px;
      line-height: 1;
      font-weight: 850;
      color: var(--primary);
      letter-spacing: -0.045em;
    }

    .date-display {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .dept-chip {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 11px;
      padding: 0 12px;
      color: #475569;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
      transition: .16s ease;
    }

    .dept-chip:hover {
      border-color: #c7d2fe;
      color: var(--primary);
      background: #fff;
    }

    .date-input {
      height: 40px;
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 11px;
      padding: 0 12px;
      outline: none;
      color: #475569;
      transition: .16s;
    }

    .date-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,110,247,.12);
      background: #fff;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #64748b;
      border-radius: 11px;
      cursor: pointer;
      transition: .16s;
      font-size: 18px;
    }

    .icon-button:hover {
      background: #fff;
      color: var(--primary);
      border-color: #c7d2fe;
      transform: translateY(-1px);
    }

    .page {
      padding: 32px;
      display: grid;
      gap: 28px;
    }

    .section {
      display: grid;
      gap: 16px;
    }

    .current-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .current-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 760;
    }

    .breadcrumb {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .crumb {
      font-size: 12px;
      font-weight: 760;
      color: var(--primary);
      background: var(--primary-soft);
      padding: 5px 10px;
      border-radius: 999px;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: 4fr 8fr;
      gap: 24px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid #eef2f7;
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .card-pad {
      padding: 24px;
    }

    .overview-card {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .donut {
      width: 128px;
      height: 128px;
      border-radius: 999px;
      background: conic-gradient(var(--primary) 0deg, var(--primary) var(--angle), #f1f5f9 var(--angle), #f1f5f9 360deg);
      position: relative;
      flex-shrink: 0;
    }

    .donut::after {
      content: "";
      position: absolute;
      inset: 17px;
      border-radius: 999px;
      background: #fff;
    }

    .donut-center {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      color: var(--text);
      font-size: 22px;
      font-weight: 850;
    }

    .overview-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 760;
    }

    .overview-value {
      margin-top: 4px;
      color: var(--text);
      font-size: 32px;
      font-weight: 850;
      letter-spacing: -0.035em;
    }

    .trend-up {
      margin-top: 10px;
      color: #22c55e;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .metric-card {
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .metric-card.red-left {
      border-left: 4px solid var(--red);
    }

    .metric-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 760;
    }

    .metric-number {
      margin-top: 6px;
      font-size: 32px;
      font-weight: 850;
      color: var(--text);
      letter-spacing: -0.035em;
    }

    .metric-number.danger {
      color: #dc2626;
    }

    .metric-unit {
      color: #94a3b8;
      font-size: 14px;
      font-weight: 400;
    }

    .metric-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .metric-icon.blue { background: #eff6ff; color: var(--primary); }
    .metric-icon.green { background: #f0fdf4; color: var(--green); }
    .metric-icon.red { background: #fef2f2; color: var(--red); }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .card-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 850;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-icon {
      color: var(--primary);
      font-size: 18px;
    }

    .card-subtitle {
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.5;
    }

    .canvas {
      width: 100%;
      height: 300px;
      display: block;
    }

    .rank-list {
      display: grid;
      gap: 10px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 28px 1fr 52px;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #eef2f7;
      background: #fbfdff;
      cursor: pointer;
      transition: .16s;
    }

    .rank-row:hover {
      border-color: #bfdbfe;
      background: #f8fbff;
      transform: translateY(-1px);
    }

    .rank-no {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 850;
    }

    .rank-name {
      font-size: 13px;
      font-weight: 850;
      color: #475569;
      margin-bottom: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-bar-bg {
      height: 8px;
      border-radius: 999px;
      background: #f1f5f9;
      overflow: hidden;
    }

    .rank-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), #7c9cff);
    }

    .rank-rate {
      font-size: 13px;
      font-weight: 850;
      color: var(--text);
      text-align: right;
    }

    .rank-meta {
      color: #94a3b8;
      font-size: 11px;
      margin-top: 5px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 8fr 4fr;
      gap: 24px;
      align-items: start;
    }

    .tab-card {
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #eef2f7;
    }

    .tab {
      flex: 1;
      height: 54px;
      border: 0;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 760;
      cursor: pointer;
      transition: .16s;
      border-bottom: 2px solid transparent;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--primary);
      background: rgba(79, 110, 247, .04);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      padding: 24px;
      min-height: 400px;
    }

    .summary-list {
      display: grid;
      gap: 16px;
    }

    .summary-card {
      padding: 20px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #eef2f7;
    }

    .summary-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .summary-title {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 850;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary-meta {
      color: var(--muted-2);
      font-size: 12px;
      margin-top: 5px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #dbeafe;
      color: #2563eb;
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .summary-body {
      color: #475569;
      font-size: 14px;
      line-height: 1.8;
    }

    .summary-body ul {
      margin: 0;
      padding-left: 18px;
    }

    .summary-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .link-group {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .text-link {
      color: #2563eb;
      font-size: 13px;
      font-weight: 760;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .text-link.ai {
      color: #7c3aed;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .project-card {
      padding: 18px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
      transition: .16s;
    }

    .project-card:hover {
      box-shadow: 0 8px 24px rgba(15, 23, 42, .07);
      border-color: #cbd5e1;
      transform: translateY(-1px);
    }

    .project-title {
      font-size: 15px;
      font-weight: 850;
      color: var(--text);
      margin-bottom: 10px;
    }

    .side-col {
      display: grid;
      gap: 24px;
    }

    .risk-list,
    .plan-list {
      display: grid;
      gap: 14px;
    }

    .risk-card {
      padding: 16px;
      border-radius: 0 10px 10px 0;
      border-left: 4px solid;
    }

    .risk-card.high {
      background: #fef2f2;
      border-left-color: var(--red);
    }

    .risk-card.mid {
      background: #fff7ed;
      border-left-color: var(--orange);
    }

    .risk-card.low {
      background: #eff6ff;
      border-left-color: var(--primary);
    }

    .risk-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .risk-project {
      color: var(--text);
      font-size: 14px;
      font-weight: 850;
    }

    .risk-body {
      font-size: 12px;
      color: #475569;
      line-height: 1.75;
      margin-bottom: 10px;
    }

    .risk-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #64748b;
      font-size: 11px;
      gap: 8px;
      margin-bottom: 8px;
    }

    .risk-level {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .risk-level.high {
      background: #fee2e2;
      color: #991b1b;
    }

    .risk-level.mid {
      background: #ffedd5;
      color: #9a3412;
    }

    .risk-level.low {
      background: #dbeafe;
      color: #1e40af;
    }

    .risk-analysis {
      padding-top: 9px;
      border-top: 1px solid rgba(148,163,184,.25);
      color: #64748b;
      font-size: 11px;
      line-height: 1.6;
    }

    .plan-section-title {
      color: #64748b;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .download-link {
      border: 0;
      background: transparent;
      color: var(--primary);
      font-size: 11px;
      cursor: pointer;
      font-weight: 760;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .plan-dot-row {
      display: flex;
      gap: 12px;
    }

    .plan-dot {
      width: 7px;
      height: 7px;
      margin-top: 7px;
      border-radius: 999px;
      background: var(--primary);
      flex-shrink: 0;
    }

    .plan-text {
      min-width: 0;
      flex: 1;
    }

    .plan-project {
      font-size: 12px;
      color: var(--text);
      font-weight: 850;
      margin-bottom: 5px;
    }

    .plan-content {
      color: #475569;
      font-size: 12px;
      line-height: 1.65;
    }

    .plan-author {
      color: #94a3b8;
      font-size: 11px;

    let selectedDeptId = "dept_root";
    let currentPage = "dept";

    const collapsed = new Set();

    function findNode(id, node = orgTree) {
      if (node.id === id) return node;
      for (const child of node.children || []) {
        const found = findNode(id, child);
        if (found) return found;
      }
      return null;
    }

    function findParent(id, node = orgTree, parent = null) {
      if (node.id === id) return parent;
      for (const child of node.children || []) {
        const found = findParent(id, child, node);
        if (found) return found;
      }
      return null;
    }

    function walk(node, fn) {
      fn(node);
      (node.children || []).forEach(child => walk(child, fn));
    }

    function getPath(id) {
      const path = [];
      let node = findNode(id);
      while (node) {
        path.unshift(node);
        node = findParent(node.id);
      }
      return path;
    }

    function getLeaves(node) {
      if (!node.children || node.children.length === 0) return [node];
      return node.children.flatMap(getLeaves);
    }

    function getRateClass(rate) {
      if (rate >= 80) return "rate-good";
      if (rate >= 60) return "rate-mid";
      return "rate-bad";
    }

    function aggregateDept(node) {
      const leaves = getLeaves(node);
      const required = leaves.reduce((sum, leaf) => sum + leafData[leaf.id].required, 0);
      const filled = leaves.reduce((sum, leaf) => sum + leafData[leaf.id].filled, 0);
      const unfilled = required - filled;
      const rate = required ? Math.round(filled / required * 100) : 0;

      const trend = [0,1,2,3,4,5,6].map(i => {
        const weighted = leaves.reduce((sum, leaf) => {
          const d = leafData[leaf.id];
          return sum + d.required * d.trend[i] / 100;
        }, 0);
        return required ? Math.round(weighted / required * 100) : 0;
      });

      return {
        leaves,
        required,
        filled,
        unfilled,
        rate,
        trend,
        summaries: leaves.flatMap(leaf => leafData[leaf.id].summary.map(text => ({ dept: leaf.name, text }))),
        projects: leaves.flatMap(leaf => leafData[leaf.id].projects.map(p => ({ ...p, dept: leaf.name }))),
        risks: leaves.flatMap(leaf => leafData[leaf.id].risks.map(r => ({ ...r, dept: leaf.name }))),
        plans: leaves.flatMap(leaf => leafData[leaf.id].plans.map(p => ({ ...p, dept: leaf.name })))
      };
    }

    function getNodeRate(node) {
      return aggregateDept(node).rate;
    }

    function selectDept(id) {
      selectedDeptId = id;

      // 展开选中节点的祖先路径，避免选中后被隐藏

    function toggleNode(id, event) {
      event.stopPropagation();
      const node = findNode(id);
      if (!node || !node.children || node.children.length === 0) return;

      if (collapsed.has(id)) collapsed.delete(id);
      else collapsed.add(id);

      renderTree();
    }

    function collapseToLevel(level) {
      collapsed.clear();
      walk(orgTree, node => {
        if (node.level >= level && node.children && node.children.length) {
          collapsed.add(node.id);
        }
      });
      getPath(selectedDeptId).forEach(n => collapsed.delete(n.id));
      renderTree();
    }

    function nodeMatchesSearch(node, q) {
      if (!q) return true;
      if (node.name.toLowerCase().includes(q.toLowerCase())) return true;
      return (node.children || []).some(child => nodeMatchesSearch(child, q));
    }

    function highlight(text, q) {
      if (!q) return text;
      const safe = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return text.replace(new RegExp(safe, "gi"), match => `<span class="highlight-mark">${match}</span>`);
    }

    function renderTree() {
      const q = document.getElementById("orgSearchInput").value.trim();
      document.getElementById("orgTree").innerHTML = buildTreeHtml(orgTree, q);
    }

    function buildTreeHtml(node, q = "") {
      if (!nodeMatchesSearch(node, q)) return "";
      const hasChildren = node.children && node.children.length;
      const rate = getNodeRate(node);
      const isCollapsed = collapsed.has(node.id) && !q;

      return `
        <ul>
          <li class="tree-node">
            <div class="node-line ${node.id === selectedDeptId ? "selected" : ""}" onclick="selectDept('${node.id}')">
              <span
                class="node-expander ${hasChildren ? "has-children" : ""} ${isCollapsed ? "collapsed" : ""}"
                onclick="toggleNode('${node.id}', event)"
                title="${hasChildren ? (isCollapsed ? "展开下级" : "隐藏下级") : "末级部门"}"
              >${hasChildren ? "▾" : "•"}</span>
              <span class="node-name" title="${node.name}">${highlight(node.name, q)}</span>
              <span class="level-tag">L${node.level}</span>
              <span class="rate-pill ${getRateClass(rate)}" style="font-size:11px;padding:2px 6px;">${rate}%</span>
            </div>
            ${hasChildren ? `
              <div class="children-wrap ${isCollapsed ? "collapsed" : ""}">
                <div class="children-inner">
                  ${(node.children || []).map(child => buildTreeHtml(child, q)).join("")}
                </div>
              </div>
            ` : ""}
          </li>
        </ul>
      `;
    }

    function renderMiniDepts() {
      const list = document.getElementById("miniDeptList");
      list.innerHTML = orgTree.children.map(node => {
        const rate = getNodeRate(node);
        return `
          <button class="mini-dept ${node.id === selectedDeptId ? "active" : ""}" onclick="selectDept('${node.id}')">

    let trendHoverIndex = -1;
    let trendSelectedIndex = 6;
    let lastTrendValues = [];
    const trendLabels = ["周四", "周五", "周六", "周日", "周一", "周二", "今日"];

    function animateNumber(id, target, suffix = "") {
      const el = document.getElementById(id);
      const start = Number((el.textContent || "0").replace("%", "")) || 0;
      const duration = 520;
      const startTime = performance.now();

      function tick(now) {
        const p = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - p, 3);
        const value = Math.round(start + (target - start) * eased);
        el.textContent = `${value}${suffix}`;
        if (p < 1) requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    function animateDonut(rate) {
      const donut = document.getElementById("donut");
      const from = Number(donut.dataset.angle || 0);
      const to = Math.round(rate * 3.6);
      const duration = 650;
      const startTime = performance.now();

      function tick(now) {
        const p = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - p, 3);
        const angle = Math.round(from + (to - from) * eased);
        donut.style.setProperty("--angle", `${angle}deg`);
        donut.dataset.angle = angle;
        if (p < 1) requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    function showTooltip(x, y, html) {
      const tooltip = document.getElementById("chartTooltip");
      tooltip.innerHTML = html;
      tooltip.style.left = `${x + 14}px`;
      tooltip.style.top = `${y + 14}px`;

    }

    function hideTooltip() {
      document.getElementById("chartTooltip").classList.remove("active");
    }

    function getTrendPointFromEvent(event) {
      const canvas = document.getElementById("trendCanvas");
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const x = (event.clientX - rect.left) * scaleX;

      const pad = { l: 42, r: 18 };
      const cw = canvas.width - pad.l - pad.r;
      const step = cw / (trendLabels.length - 1);
      const idx = Math.round((x - pad.l) / step);
      if (idx < 0 || idx >= trendLabels.length) return -1;

      const px = pad.l + step * idx;
      return Math.abs(x - px) <= step / 2 ? idx : -1;
    }

    function setupTrendInteractions() {
      const canvas = document.getElementById("trendCanvas");
      if (canvas.dataset.bound === "true") return;
      canvas.dataset.bound = "true";

      canvas.addEventListener("mousemove", event => {
        const idx = getTrendPointFromEvent(event);
        if (idx !== trendHoverIndex) {
          trendHoverIndex = idx;
          drawTrend("trendCanvas", lastTrendValues);
        }

        if (idx >= 0) {
          showTooltip(
            event.clientX,
            event.clientY,
            `<strong>${trendLabels[idx]}</strong><span>填写率：${lastTrendValues[idx]}%</span><br><span>点击可锁定该日期</span>`
          );
        } else {
          hideTooltip();
        }
      });

      canvas.addEventListener("mouseleave", () => {
        trendHoverIndex = -1;
        hideTooltip();
        drawTrend("trendCanvas", lastTrendValues);
      });

      canvas.addEventListener("click", event => {
        const idx = getTrendPointFromEvent(event);
        if (idx >= 0) {
          trendSelectedIndex = idx;
          drawTrend("trendCanvas", lastTrendValues);
          showTooltip(
            event.clientX,
            event.clientY,
            `<strong>已选择 ${trendLabels[idx]}</strong><span>填写率：${lastTrendValues[idx]}%</span>`
          );
        }
      });
    }

    function drawTrend(canvasId, values) {
      lastTrendValues = values;
      setupTrendInteractions();

      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0,0,w,h);

      const pad = { l: 42, r: 18, t: 18, b: 38 };
      const cw = w - pad.l - pad.r;
      const ch = h - pad.t - pad.b;

      ctx.strokeStyle = "#f1f5f9";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#94a3b8";
      ctx.font = "12px Inter, system-ui, sans-serif";

      for (let i = 0; i <= 5; i++) {
        const y = pad.t + ch * i / 5;
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(w - pad.r, y);
        ctx.stroke();
        ctx.fillText(`${100 - i * 20}%`, 2, y + 4);
      }

      trendLabels.forEach((label, i) => {
        const x = pad.l + cw * i / (trendLabels.length - 1);
        ctx.fillText(label, x - 14, h - 12);
      });

      const points = values.map((v, i) => ({
        x: pad.l + cw * i / (values.length - 1),
        y: pad.t + ch * (100 - v) / 100
      }));

      const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
      grad.addColorStop(0, "rgba(79,110,247,.22)");
      grad.addColorStop(1, "rgba(79,110,247,0)");

      ctx.beginPath();
      points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, h - pad.b);
      ctx.lineTo(points[0].x, h - pad.b);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.beginPath();
      points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.strokeStyle = "#4f6ef7";
      ctx.lineWidth = 3;
      ctx.stroke();

      if (trendSelectedIndex >= 0 && points[trendSelectedIndex]) {
        const p = points[trendSelectedIndex];
        ctx.strokeStyle = "rgba(79,110,247,.28)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p.x, pad.t);
        ctx.lineTo(p.x, h - pad.b);
        ctx.stroke();

        ctx.fillStyle = "rgba(79,110,247,.08)";
        ctx.fillRect(p.x - 22, pad.t, 44, ch);
      }

      points.forEach((p, i) => {
        const active = i === trendHoverIndex || i === trendSelectedIndex;
        ctx.beginPath();
        ctx.fillStyle = "#fff";
        ctx.arc(p.x, p.y, active ? 8 : 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = active ? "#3150d4" : "#4f6ef7";
        ctx.lineWidth = active ? 4 : 3;
        ctx.stroke();

        if (active) {
          ctx.fillStyle = "#1e293b";
          ctx.font = "bold 12px Inter, system-ui, sans-serif";
          ctx.fillText(`${values[i]}%`, p.x - 14, p.y - 14);
          ctx.font = "12px Inter, system-ui, sans-serif";
        }
      });
    }

    function getRankingCandidates(node) {
      if (node.level === 5) {
        const parent = findParent(node.id);
        return parent?.children || [node];
      }
      return getLeaves(node);
    }

    function renderRanking(node) {
      const rows = getRankingCandidates(node).map(n => {
        const d = aggregateDept(n);
        const avg = Math.round(d.trend.reduce((a,b) => a+b, 0) / d.trend.length);
        return { node: n, data: d, avg };
      }).sort((a,b) => b.avg - a.avg);

      document.getElementById("rankTitle").textContent = node.level === 5
        ? "一周同部门填写率排行"
        : `L${node.level} 旗下 L5 部门填写率排行`;

      document.getElementById("rankSub").textContent = node.level === 5
        ? "展示同一父部门下 L5 部门的一周平均填写率"
        : "展示当前部门下所有 L5 部门的一周平均填写率";

      document.getElementById("rankList").innerHTML = rows.map((row, idx) => `
        <div class="rank-row" onclick="selectDept('${row.node.id}')">
          <div class="rank-no">${idx + 1}</div>
          <div>
            <div class="rank-name">${row.node.name}</div>
            <div class="rank-bar-bg"><div class="rank-bar" style="width:${row.avg}%"></div></div>
            <div class="rank-meta">今日 ${row.data.rate}% ｜ 应填 ${row.data.required} ｜ 已填 ${row.data.filled}</div>
          </div>
          <div class="rank-rate">${row.avg}%</div>
        </div>
      `).join("");
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
      document.getElementById("deptContent").classList.toggle("hidden", tab !== "dept");
      document.getElementById("projectContent").classList.toggle("hidden", tab !== "project");
    }

    function renderDeptContent(node, data) {
      const isLeaf = node.level === 5;

      if (isLeaf) {
        document.getElementById("deptContent").innerHTML = `
          <div class="summary-list">
            <div class="summary-card">
              <div class="summary-head">
                <div>
                  <h4 class="summary-title">📄 今日工作总结（${node.name}）</h4>
                  <div class="summary-meta">填写率 ${data.rate}% ｜ 应填 ${data.required} ｜ 已填 ${data.filled}</div>
                </div>
                <span class="tag">部门日报</span>
              </div>
              <div class="summary-body">
                <ul>${data.summaries.map(item => `<li>${item.text}</li>`).join("")}</ul>
              </div>
              <div class="summary-footer">
                <div class="link-group">
                  <a class="text-link" href="javascript:void(0)">↗ 查看原文</a>
                  <a class="text-link ai" href="javascript:void(0)">✦ 查看AI日报</a>
                </div>
                <span class="card-subtitle">更新于 17:45</span>
              </div>
            </div>
          </div>
        `;
        return;
      }

      document.getElementById("deptContent").innerHTML = `
        <div class="summary-list">
          ${data.leaves.map(leaf => {
            const d = leafData[leaf.id];
            const ld = aggregateDept(leaf);
            return `
              <div class="summary-card">
                <div class="summary-head">
                  <div>
                    <h4 class="summary-title">📄 今日工作总结（${leaf.name}）</h4>
                    <div class="summary-meta">填写率 ${ld.rate}% ｜ 应填 ${ld.required} ｜ 已填 ${ld.filled}</div>
                  </div>
                  <span class="tag">L5部门</span>
                </div>
                <div class="summary-body">
                  <ul>${d.summary.map(text => `<li>${text}</li>`).join("")}</ul>
                </div>
                <div class="summary-footer">
                  <div class="link-group">
                    <a class="text-link" href="javascript:void(0)">↗ 查看原文</a>
                    <a class="text-link ai" href="javascript:void(0)">✦ 查看AI日报</a>
                  </div>
                  <span class="card-subtitle">更新于 17:45</span>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderProjectContent(data) {
      if (!data.projects.length) {
        document.getElementById("projectContent").innerHTML = `<div class="empty">暂无平台项目日报</div>`;
        return;
      }

      document.getElementById("projectContent").innerHTML = `
        <div class="project-grid">
          ${data.projects.map(p => `
            <div class="project-card">
              <div class="summary-head" style="margin-bottom:12px;">
                <div>
                  <div class="project-title">${p.name}</div>
                  <div class="summary-meta">${p.dept} ｜ 负责人：${p.owner} ｜ 填写率 ${p.rate}%</div>
                </div>
                <span class="tag">${p.platform}</span>
              </div>
              <div class="summary-body" style="font-size:13px;">${p.progress}</div>
              <div class="summary-footer" style="padding-top:14px;margin-top:14px;">
                <div class="link-group">
                  <a class="text-link" href="javascript:void(0)">↗ 查看原文</a>
                  <a class="text-link ai" href="javascript:void(0)">✦ 查看AI日报</a>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderRisks(risks) {
      document.getElementById("riskCount").textContent = `${risks.length} 条`;
      if (!risks.length) {
        document.getElementById("riskList").innerHTML = `<div class="empty">当前范围暂无明显风险</div>`;
        return;
      }

      const cls = { "高": "high", "中": "mid", "低": "low" };
      const order = { "高": 1, "中": 2, "低": 3 };

      document.getElementById("riskList").innerHTML = risks.slice().sort((a,b) => order[a.level] - order[b.level]).map(r => `
        <div class="risk-card ${cls[r.level]}">
          <div class="risk-head">
            <div class="risk-project">${r.project}</div>
            <span class="tag">${r.tag}</span>
          </div>
          <div class="risk-body">${r.content}</div>
          <div class="risk-meta">
            <span>${r.dept} ｜ 提交人：${r.submitter}</span>
            <span class="risk-level ${cls[r.level]}">${r.level}风险</span>
          </div>
          <div class="risk-analysis">风险点分析：${r.analysis}</div>
        </div>
      `).join("");
    }

    function renderPlans(plans) {
      const mine = plans.filter(p => p.scope === "mine" || p.author === "段明昊");
      const team = plans;

      const mineHtml = mine.length ? mine.map(p => `
        <div class="plan-dot-row">
          <div class="plan-dot"></div>
          <div class="plan-text">
            <div class="plan-project">${p.project} <span class="tag" style="margin-left:4px;">${p.tag}</span></div>
            <div class="plan-content">${p.content}</div>
            <div class="plan-author">${p.dept} ｜ 撰写人：${p.author} ｜ 截止：${p.due}</div>
          </div>
        </div>
      `).join("") : `<div class="empty">暂无我的计划</div>`;

      const teamHtml = team.length ? team.map(p => `
        <div class="team-plan-card">
          <div class="plan-project">${p.project} <span class="tag" style="margin-left:4px;">${p.tag}</span></div>
          <div class="plan-content">${p.content}</div>
          <div class="plan-author">${p.dept} ｜ 撰写人：${p.author} ｜ 截止：${p.due}</div>
        </div>
      `).join("") : `<div class="empty">暂无团队计划</div>`;

      document.getElementById("planList").innerHTML = `
        <div>
          <div class="plan-section-title">
            <span>我的计划</span>
            <button class="download-link" onclick="exportPlans()">↓ 导出为 txt</button>
          </div>
          <div class="plan-list">${mineHtml}</div>
        </div>
        <div style="margin-top:22px;">
          <div class="plan-section-title"><span>团队计划</span></div>
          <div class="plan-list">${teamHtml}</div>
        </div>
      `;
    }

    function exportPlans() {
      const node = findNode(selectedDeptId);
      const data = aggregateDept(node);
      const mine = data.plans.filter(p => p.scope === "mine" || p.author === "段明昊");

      let text = `我的下一步计划\n查看范围：${node.name}\n日期：${document.getElementById("datePicker").value}\n姓名：段明昊\n\n`;
      if (!mine.length) {
        text += "暂无我的计划。\n";
      } else {
        mine.forEach((p, i) => {
          text += `${i + 1}. [${p.project}] ${p.content}\n   所属部门：${p.dept}\n   截止日期：${p.due}\n\n`;
        });
      }

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `下一步计划_段明昊_${document.getElementById("datePicker").value}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function refreshDashboard() {
      const node = findNode(selectedDeptId);
      const data = aggregateDept(node);

      document.getElementById("currentDeptChip").textContent = node.name;
      document.getElementById("breadcrumb").innerHTML = getPath(node.id).map(n => `<span class="crumb">${n.name}</span>`).join("");

      animateDonut(data.rate);
      animateNumber("fillRateText", data.rate, "%");
      animateNumber("overallRateText", data.rate, "%");
      animateNumber("requiredCount", data.required);
      animateNumber("filledCount", data.filled);
      animateNumber("unfilledCount", data.unfilled);

      document.getElementById("scopeText").textContent = node.level === 5
        ? "当前为 L5 部门，展示本部门明细"
        : `当前为 L${node.level} 部门，聚合旗下 ${data.leaves.length} 个 L5 部门`;

      document.getElementById("trendSub").textContent = node.level === 5
        ? "当前 L5 部门最近 7 天数据"
        : `当前 L${node.level} 部门聚合最近 7 天数据`;

      drawTrend("trendCanvas", data.trend);
      renderRanking(node);
      renderDeptContent(node, data);
      renderProjectContent(data);
      renderRisks(data.risks);
      renderPlans(data.plans);
      renderMiniDepts();
      renderTree();
      switchTab(activeTab);
    }

    function updateDateDisplay() {
      const date = new Date(document.getElementById("datePicker").value || "2026-06-03");
      const text = date.toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
      document.getElementById("currentDateDisplay").textContent = text;
    }

    document.getElementById("datePicker").addEventListener("change", updateDateDisplay);

    // 初始状态：只展开到 L3，保持树清爽；选中路径始终展开
    walk(orgTree, node => {
      if (node.level >= 3 && node.children && node.children.length) collapsed.add(node.id);
    });
    getPath(selectedDeptId).forEach(n => collapsed.delete(n.id));

    renderMiniDepts();
    renderTree();
    updateDateDisplay();
    refreshDashboard();
  </script>
</body>
</html>
